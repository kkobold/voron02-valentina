################################
####  Simple Screen Config  ####
################################
[display]
lcd_type: sh1106
click_pin: ^!PA15
#i2c_bus: i2c1_PB8_PB9
i2c_bus: i2c1_PB6_PB7
i2c_mcu = mcu 
encoder_pins: ^PA10, ^PA9
kill_pin: ^!PD6
vcomh: 60
x_offset: 2


[board_pins]
aliases:
    # EXP1 header
    EXP1_1=PB5,  EXP1_3=TX1,   EXP1_5=RX1, EXP1_7=PB8, EXP1_9=<GND>,
    EXP1_2=PA15, EXP1_4=<RST>, EXP1_6=PB9,  EXP1_8=PB15, EXP1_10=<5V>

